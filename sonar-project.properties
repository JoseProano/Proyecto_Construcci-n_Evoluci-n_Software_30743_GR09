# ================================================================
# SonarCloud – Configuración del proyecto AmazonFish
# Documentación: https://sonarcloud.io
#
# IMPORTANTE: En SonarCloud, crear el proyecto con:
#   Organization: joseproano
#   Project key:  amazonfish-gr09
# ================================================================

sonar.projectKey=amazonfish-gr09
sonar.organization=joseproano
sonar.projectName=AmazonFish GR09
sonar.projectVersion=1.0.0

# ── Fuentes a analizar ──────────────────────────────────────────
sonar.sources=backend
sonar.tests=backend/tests

# ── Exclusiones ─────────────────────────────────────────────────
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  app/**,\
  database/**,\
  docs/**,\
  scripts/**

sonar.test.inclusions=backend/tests/**

# ── Python ──────────────────────────────────────────────────────
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

# ── Encoding ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
